name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          experimental: true

      - name: Validate version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION=$(grep -o '"[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*[^"]*"' Sources/main.swift | tr -d '"')
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($SOURCE_VERSION)"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Build and package
        run: make package

      - name: Smoke test
        run: .build/apple/Products/Release/dark-scripter --version

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            .build/apple/Products/Release/dark-scripter-macos-universal.zip \
            --generate-notes \
            $PRERELEASE

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 .build/apple/Products/Release/dark-scripter-macos-universal.zip | awk '{print $1}')

          git clone "https://x-access-token:${GH_TOKEN}@github.com/pvinis/homebrew-pvinis.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/dark-scripter.rb << 'FORMULA'
          class DarkScripter < Formula
            desc "Listen for macOS dark/light mode changes and run user scripts"
            homepage "https://github.com/pvinis/dark-scripter"
            url "https://github.com/pvinis/dark-scripter/releases/download/TAG/dark-scripter-macos-universal.zip"
            sha256 "SHAPLACEHOLDER"
            license "MIT"

            depends_on :macos

            def install
              bin.install "dark-scripter"
            end

            service do
              run [opt_bin/"dark-scripter"]
              keep_alive true
              run_at_load true
              log_path var/"log/dark-scripter.log"
              error_log_path var/"log/dark-scripter.log"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dark-scripter --version")
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i '' "s|TAG|${GITHUB_REF_NAME}|" Formula/dark-scripter.rb
          sed -i '' "s|SHAPLACEHOLDER|${SHA256}|" Formula/dark-scripter.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "update-dark-scripter-${VERSION}"
          git add Formula/dark-scripter.rb
          git commit -m "Update dark-scripter to ${VERSION}"
          git push origin "update-dark-scripter-${VERSION}"

          gh pr create \
            --repo pvinis/homebrew-pvinis \
            --title "Update dark-scripter to ${VERSION}" \
            --body "Automated update from [dark-scripter v${VERSION}](https://github.com/pvinis/dark-scripter/releases/tag/${GITHUB_REF_NAME})" \
            --head "update-dark-scripter-${VERSION}"
